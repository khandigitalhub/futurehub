<!DOCTYPE html>
<html>
<head>
    <title>Register - FutureHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; background: linear-gradient(135deg,#667eea,#764ba2); padding: 20px;">
    <div style="background: white; border-radius: 30px; padding: 30px; max-width: 380px; margin: auto;">
        <h2 style="text-align: center;">📝 Create Account</h2>
        
        <input type="text" id="fullName" placeholder="Full Name" style="width: 100%; padding: 12px; margin: 8px 0; border-radius: 30px; border: 1px solid #ddd;">
        <input type="email" id="email" placeholder="Email" style="width: 100%; padding: 12px; margin: 8px 0; border-radius: 30px; border: 1px solid #ddd;">
        <input type="tel" id="mobile" placeholder="Mobile Number" style="width: 100%; padding: 12px; margin: 8px 0; border-radius: 30px; border: 1px solid #ddd;">
        <input type="password" id="password" placeholder="Password (min 6)" style="width: 100%; padding: 12px; margin: 8px 0; border-radius: 30px; border: 1px solid #ddd;">
        
        <button id="registerBtn" style="width: 100%; padding: 12px; background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; border-radius: 30px; font-size: 16px; cursor: pointer; margin-top: 10px;">Register</button>
        
        <div id="message" style="margin-top: 15px; padding: 10px; border-radius: 10px; text-align: center;"></div>
        
        <p style="text-align: center; margin-top: 15px;">Already have account? <a href="login.html" style="color: #667eea;">Login</a></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://pvuiqfimcwjiijwklbll.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_fQECCsxmVFT008GceAD8GA_SzeXobm0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('registerBtn').onclick = async function() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');

            // Start message
            msgDiv.innerHTML = '<span style="color:blue;">⏳ Processing...</span>';
            msgDiv.style.background = "#eef";

            // Validation
            if (!fullName || !email || !mobile || !password) {
                msgDiv.innerHTML = '<span style="color:red;">❌ All fields required</span>';
                msgDiv.style.background = "#fee";
                return;
            }
            if (password.length < 6) {
                msgDiv.innerHTML = '<span style="color:red;">❌ Password must be 6+ characters</span>';
                msgDiv.style.background = "#fee";
                return;
            }

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            mobile: mobile
                        }
                    }
                });

                if (error) {
                    msgDiv.innerHTML = '<span style="color:red;">❌ ' + error.message + '</span>';
                    msgDiv.style.background = "#fee";
                } else {
                    msgDiv.innerHTML = '<span style="color:green;">✅ Verification email sent! Check your inbox.</span>';
                    msgDiv.style.background = "#efe";
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 4000);
                }
            } catch(err) {
                msgDiv.innerHTML = '<span style="color:red;">❌ ' + err.message + '</span>';
                msgDiv.style.background = "#fee";
            }
        };
    </script>
</body>
</html>
