<!DOCTYPE html>
<html>
<head>
    <title>Register - FutureHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body{font-family:Arial;background:#667eea;padding:20px}
        .card{background:white;border-radius:20px;padding:25px;max-width:350px;margin:auto}
        input{width:100%;padding:10px;margin:8px 0;border-radius:30px;border:1px solid #ddd}
        button{width:100%;padding:10px;background:#667eea;color:white;border:none;border-radius:30px;cursor:pointer}
        .msg{margin-top:15px;padding:10px;border-radius:10px}
        .error{background:#fee;color:red}
        .success{background:#efe;color:green}
    </style>
</head>
<body>
    <div class="card">
        <h2>Register</h2>
        <input type="text" id="fullName" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="tel" id="mobile" placeholder="Mobile">
        <input type="password" id="password" placeholder="Password">
        <button id="btn">Create Account</button>
        <div id="msg" class="msg"></div>
        <p><a href="login.html">Login</a></p>
    </div>

    <script>
        // প্রথম টেস্ট: পেজ লোড হলে alert
        alert('Page loaded successfully!');

        // দ্বিতীয় টেস্ট: বাটন ক্লিক করলে alert
        const btn = document.getElementById('btn');
        
        btn.onclick = function() {
            alert('Button clicked! Now registering...');
            
            // এখানে রেজিস্ট্রেশন কোড
            const full = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const mobile = document.getElementById('mobile').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            if (!full || !email || !mobile || !pass) {
                msg.innerHTML = '<div class="error">❌ All fields required</div>';
                return;
            }
            if (pass.length < 6) {
                msg.innerHTML = '<div class="error">❌ Password min 6 chars</div>';
                return;
            }

            msg.innerHTML = '<div class="info">⏳ Registering...</div>';
            
            const supabase = window.supabase.createClient(
                'https://pvuiqfimcwjiijwklbll.supabase.co',
                'sb_publishable_fQECCsxmVFT008GceAD8GA_SzeXobm0'
            );

            supabase.auth.signUp({
                email: email,
                password: pass,
                options: { data: { full_name: full, mobile: mobile } }
            }).then(result => {
                if (result.error) {
                    msg.innerHTML = '<div class="error">❌ ' + result.error.message + '</div>';
                } else {
                    msg.innerHTML = '<div class="success">✅ Verification email sent!</div>';
                    setTimeout(() => { window.location.href = 'login.html'; }, 3000);
                }
            }).catch(err => {
                msg.innerHTML = '<div class="error">❌ ' + err.message + '</div>';
            });
        };
    </script>
</body>
</html>
