<!DOCTYPE html>
<html>
<head>
    <title>Login - FutureHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px}
        .card{background:white;border-radius:20px;padding:25px;max-width:350px;margin:auto}
        input{width:100%;padding:10px;margin:8px 0;border-radius:30px;border:1px solid #ddd}
        button{width:100%;padding:10px;background:#667eea;color:white;border:none;border-radius:30px;cursor:pointer}
        .error{color:red;text-align:center;margin-top:10px}
        .success{color:green;text-align:center;margin-top:10px}
        a{color:#667eea}
    </style>
</head>
<body>
    <div class="card">
        <h2>Welcome Back</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="msg"></div>
        <p><a href="register.html">No account? Register</a></p>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://pvuiqfimcwjiijwklbll.supabase.co',
            'sb_publishable_fQECCsxmVFT008GceAD8GA_SzeXobm0'
        );

        document.getElementById('loginBtn').onclick = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            if (!email || !password) {
                msg.innerHTML = '<div class="error">Email and password required</div>';
                return;
            }

            msg.innerHTML = '<div class="success">Logging in...</div>';

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                msg.innerHTML = '<div class="error">' + error.message + '</div>';
            } else {
                msg.innerHTML = '<div class="success">Login successful! Redirecting...</div>';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        };
    </script>
</body>
</html>
