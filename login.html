<!DOCTYPE html>
<html>
<head>
    <title>Login - FutureHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 350px;
            width: 100%;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 30px;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }
        .error { color: red; }
        a { color: #667eea; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Login to FutureHub</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="error" class="error"></p>
        <p>No account? <a href="register.html">Register</a></p>
    </div>
    <script>
        const SUPABASE_URL = 'https://pvuiqfimcwjiijwklbll.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_fQECCsxmVFT008GceAD8GA_SzeXobm0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if(error) {
                document.getElementById('error').innerText = error.message;
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
