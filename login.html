<!DOCTYPE html>
<html>
<head>
    <title>Login - FutureHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h2 { margin-bottom: 24px; color: #1e293b; font-size: 1.6rem; }
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #667eea; }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .error { color: #ef4444; font-size: 0.8rem; margin-top: 12px; }
        .info { color: #3b82f6; font-size: 0.8rem; margin-top: 12px; }
        a { color: #667eea; text-decoration: none; }
        .link { margin-top: 20px; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Welcome Back</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="message"></div>
        <div class="link">No account? <a href="register.html">Register</a></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pvuiqfimcwjiijwklbll.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_fQECCsxmVFT008GceAD8GA_SzeXobm0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('loginBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');

            if (!email || !password) {
                msgDiv.innerHTML = '<div class="error">❌ Email and password required</div>';
                return;
            }

            msgDiv.innerHTML = '<div class="info">⏳ Logging in...</div>';

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                msgDiv.innerHTML = '<div class="error">❌ ' + error.message + '</div>';
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
