<!DOCTYPE html>
<html>
<head>
    <title>Login - FutureHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 350px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h2 { margin-bottom: 20px; color: #333; }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .error { color: red; font-size: 14px; margin-top: 10px; }
        a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Login to FutureHub</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="error" class="error"></div>
        <p>No account? <a href="register.html">Register</a></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://pvuiqfimcwjiijwklbll.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_fQECCsxmVFT008GceAD8GA_SzeXobm0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('loginBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            if (!email || !password) {
                errorDiv.innerText = '❌ ইমেইল এবং পাসওয়ার্ড দিন';
                return;
            }

            errorDiv.innerText = '⏳ লগইন হচ্ছে...';

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                errorDiv.innerText = '❌ ' + error.message;
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
